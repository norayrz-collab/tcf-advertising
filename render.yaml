services:
  - type: web
    name: ads-dashboard
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: SESSION_SECRET
        sync: false
      - key: APP_PASSWORD_HASH
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
